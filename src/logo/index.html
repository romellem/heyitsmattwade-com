<style>
	:root {
		/* https://coolors.co/palette/f5ffc6-b4e1ff-ab87ff-fface4-c1ff9b */
		/* --yellow: #f5ffc6; */
		--blue: #b4e1ff;
		--purple: #ab87ff;
		--pink: #fface4;
		--green: #c1ff9b;
	}
	.grid {
		display: grid;
		grid-template-columns: repeat(2, 100px);
		grid-template-rows: repeat(2, 100px);
		grid-column-gap: 0px;
		grid-row-gap: 0px;
		max-width: 200px;
	}

	.grid + .grid {
		/* margin-top: 1em; */
	}

	.grid > div {
		position: relative;
	}
	span {
		position: absolute;
		background: black;
	}

	.div1 {
		grid-area: 1 / 1 / 2 / 2;
		background: var(--green);
	}
	.div2 {
		grid-area: 1 / 2 / 2 / 3;
		background: var(--pink);
	}
	.div3 {
		grid-area: 2 / 1 / 3 / 2;
		background: var(--pink);
	}
	.div4 {
		grid-area: 2 / 2 / 3 / 3;
		background: var(--green);
	}

	.ht {
		height: 40%;
		width: 16px;
		background: var(--pink);
		top: 0;
		left: calc(50% - 8px);
		border-bottom-left-radius: 8px;
		border-bottom-right-radius: 8px;
	}
	.hb {
		height: 40%;
		width: 16px;
		background: var(--pink);
		bottom: 0;
		left: calc(50% - 8px);
		border-top-left-radius: 8px;
		border-top-right-radius: 8px;
	}
	.he1 {
		width: 16px;
		height: 16px;
		background: var(--green);
		top: 100%;
		z-index: 1;

		&::before {
			content: '';
			position: absolute;
			width: 16px;
			height: 16px;
			background: var(--pink);
			border-top-left-radius: 8px;
		}
	}

	.il {
		width: 40%;
		height: 16px;
		background: var(--green);
		left: 0;
		top: calc(50% - 8px);
		border-bottom-right-radius: 8px;
		border-top-right-radius: 8px;
	}

	.ir {
		width: 40%;
		height: 16px;
		background: var(--green);
		right: 0;
		top: calc(50% - 8px);
		border-bottom-left-radius: 8px;
		border-top-left-radius: 8px;
	}

	.ie1 {
		width: 16px;
		height: 16px;
		background: var(--green);
		top: 0;
		left:0;
		z-index: 1;

		&::before {
			content: '';
			position: absolute;
			width: 16px;
			height: 16px;
			background: var(--pink);
			border-top-left-radius: 8px;
		}
	}

	.ml {
		height: 40%;
		width: 16px;
		background: var(--green);
		bottom: 0;
		right: calc(50% + 8px);
		border-top-left-radius: 8px;
		border-top-right-radius: 8px;
	}

	.mr {
		height: 60%;
		width: 16px;
		background: var(--green);
		bottom: 0;
		left: calc(50% + 8px);
		border-top-left-radius: 8px;
		border-top-right-radius: 8px;
	}

	.me1 {
		width: 16px;
		height: 16px;
		background: var(--green);
		bottom: 0;
		right:0;
		z-index: 1;

		&::before {
			content: '';
			position: absolute;
			width: 16px;
			height: 16px;
			background: var(--pink);
			border-bottom-right-radius: 8px;
		}
	}

	.wl {
		height: 80%;
		width: 16px;
		background: var(--pink);
		top: 0;
		right: calc(50% + 8px);
		border-bottom-left-radius: 8px;
		border-bottom-right-radius: 8px;
	}

	.wr {
		height: 60%;
		width: 16px;
		background: var(--pink);
		top: 0;
		left: calc(50% + 8px);
		border-bottom-left-radius: 8px;
		border-bottom-right-radius: 8px;
	}

	.we1 {
		width: 16px;
		height: 16px;
		background: var(--green);
		bottom: 100%;
		right:0;
		z-index: 1;

		&::before {
			content: '';
			position: absolute;
			width: 16px;
			height: 16px;
			background: var(--pink);
			border-bottom-right-radius: 8px;
		}
	}

	#app {
		display: grid;
		grid-template-columns: repeat(4, max-content);

		> * {
			transform-origin: center;
		}

		/* > :nth-child(4n + 1) {
			rotate: 0deg;
			
		}
		> :nth-child(4n + 2) {
			rotate: -90deg;
			transform: translateX(50%);
		}
		> :nth-child(4n + 3) {
			rotate: 90deg;
		}
		> :nth-child(4n + 4) {
			rotate: -270deg;
		} */
	}
</style>

<div id="app"></div>


<script>
	const $ = (s, p) => p ? p.querySelector(s) : document.querySelector(s);
	const $$ = (s, p) => p ? p.querySelectorAll(s) : document.querySelectorAll(s);
	const app = $('#app');
	const makeEl = () => {
		const temp = document.createElement('div');
		temp.innerHTML = `<div class="grid">
	<div class="div1"><span class="ht"></span><span class="hb"></span><span class="he1"></span></div>
	<div class="div2"><span class="il"></span><span class="ir"></span><span class="ie1"></span></div>
	<div class="div3"><span class="ml"></span><span class="mr"></span><span class="me1"></span></div>
	<div class="div4"><span class="wl"></span><span class="wr"></span><span class="we1"></span></div>
</div>`;
		return temp.firstChild;
	}

	for (let i = 0; i < 16; i++) app.appendChild(makeEl());



</script>
